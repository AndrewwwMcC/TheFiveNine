  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #f4f3f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      width: 130px;
      height: 185px;
    }

    @media (max-width: 480px) {
      .logo-wrap {
        width: 100px;
        height: 142px;
      }
    }

    .logo-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #diag-arm {
      transform-origin: 63.28% 59.57%;
    }

    /* ── Wordmark ── */
    .wordmark {
      margin-top: 28px;
      letter-spacing: 0.28em;
      font-size: 12.5px;
      font-weight: 300;
      color: #111111;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .wordmark {
        font-size: 11px;
        margin-top: 22px;
      }
    }

    /* ── Live indicator ── */
    .live {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot-wrap {
      position: relative;
      width: 10px;
      height: 10px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgb(0, 220, 100);
      position: absolute;
      top: 0;
      left: 0;
    }

    .live-ring {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgb(0, 220, 100);
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    .live-ring.pulse {
      animation: ping 0.8s ease-out forwards;
    }

    @keyframes ping {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(2.8); opacity: 0; }
    }

    .live-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #111;
      text-transform: uppercase;
    }
  </style>
</head>

  <p class="wordmark">The Five Nine</p>

  <div class="live" aria-label="Live">
    <div class="live-dot-wrap">
      <div class="live-ring" id="live-ring"></div>
      <div class="live-dot"></div>
    </div>
    <span class="live-label">Live</span>
  </div>

  <script>
    const HOME    = 153.9;
    const arm     = document.getElementById('diag-arm');
    const ring    = document.getElementById('live-ring');

    function tick() {
      // Rotate minute hand
      const now  = new Date();
      const mins = now.getMinutes() + now.getSeconds() / 60;
      arm.style.transform = `rotate(${((mins * 6) - HOME).toFixed(3)}deg)`;

      // Pulse the live ring
      ring.classList.remove('pulse');
      void ring.offsetWidth; // force reflow to restart animation
      ring.classList.add('pulse');
    }

    tick();
    setInterval(tick, 1000);
  </script>
