  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #f4f3f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      width: 130px;
      height: 185px;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .logo-wrap {
        width: 100px;
        height: 142px;
      }
    }

    .logo-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Minute hand — static by default */
    #diag-arm {
      transform-origin: 63.28% 59.57%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* On hover: single spin with ease-in at start, ease-out at end */
    .logo-wrap:hover #diag-arm {
      animation: spin 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      transition: none;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ── Wordmark ── */
    .wordmark {
      margin-top: 28px;
      letter-spacing: 0.28em;
      font-size: 12.5px;
      font-weight: 300;
      color: #111111;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .wordmark {
        font-size: 11px;
        margin-top: 22px;
      }
    }

    /* ── Live indicator ── */
    .live {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot-wrap {
      position: relative;
      width: 10px;
      height: 10px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgb(0, 220, 100);
      position: absolute;
      top: 0;
      left: 0;
    }

    .live-ring {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgb(0, 220, 100);
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      animation: ping 2s ease-out infinite;
    }

    @keyframes ping {
      0%   { transform: scale(1);   opacity: 0.7; }
      70%  { transform: scale(2.8); opacity: 0; }
      100% { transform: scale(2.8); opacity: 0; }
    }

    .live-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #111;
      text-transform: uppercase;
    }
  </style>
</head>
